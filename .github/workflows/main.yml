name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore IoCTools.sln

      - name: Build solution
        run: dotnet build IoCTools.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test IoCTools.sln --configuration Release --no-build --no-restore --verbosity normal

  publish:
    name: publish NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: IoC Abstractions publish on version change
        id: publish_abstractions_nuget
        uses: alirezanet/publish-nuget@v3.1.0
        with:
          PROJECT_FILE_PATH: IoCTools.Abstractions/IoCTools.Abstractions.csproj
          NUGET_KEY: ${{secrets.NUGET_API_KEY}}

      - name: IoC Generator publish on version change
        id: publish_generator_nuget
        uses: alirezanet/publish-nuget@v3.1.0
        with:
          PROJECT_FILE_PATH: IoCTools.Generator/IoCTools.Generator/IoCTools.Generator.csproj
          NUGET_KEY: ${{secrets.NUGET_API_KEY}}
